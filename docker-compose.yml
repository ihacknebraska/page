services:
  traefik:
    image: traefik:v3
    container_name: ihacknebraska-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - edge

  nginx:
    image: nginx:1.27-alpine
    container_name: ihacknebraska-nginx
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_started
    volumes:
      - wordpress_data:/var/www/html:ro
      - ./wordpress/themes/ihacknebraska:/var/www/html/wp-content/themes/ihacknebraska:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      traefik.enable: "true"
      traefik.http.routers.ihacknebraska.rule: Host(`${DOMAIN_NAME}`) || Host(`www.${DOMAIN_NAME}`)
      traefik.http.routers.ihacknebraska.entrypoints: websecure
      traefik.http.routers.ihacknebraska.tls: "true"
      traefik.http.routers.ihacknebraska.tls.certresolver: letsencrypt
      traefik.http.services.ihacknebraska.loadbalancer.server.port: "80"
      traefik.docker.network: ihacknebraska_edge
    networks:
      - edge
      - internal

  wordpress:
    image: wordpress:php8.3-fpm-alpine
    container_name: ihacknebraska-wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'https://${DOMAIN_NAME}');
        define('WP_SITEURL', 'https://${DOMAIN_NAME}');
        define('FORCE_SSL_ADMIN', true);
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $$_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - wordpress_data:/var/www/html
      - ./wordpress/themes/ihacknebraska:/var/www/html/wp-content/themes/ihacknebraska:ro
    networks:
      - internal

  db:
    image: mariadb:11.4
    container_name: ihacknebraska-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME}
      MARIADB_USER: ${WORDPRESS_DB_USER}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  db_data:
  wordpress_data:
  traefik_letsencrypt:

networks:
  edge:
  internal:
    internal: true
